# Builds Flutter web and publishes to the gh-pages branch on every push to main.
# One-time setup in GitHub: Settings → Pages → Source → Deploy from branch → gh-pages / root
name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build for GitHub Pages
        run: bash scripts/github_pages_build.sh
        env:
          GITHUB_PAGES_BASE_HREF: /snack-burger/

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          commit_message: 'deploy: GitHub Pages (${{ github.sha }})'
